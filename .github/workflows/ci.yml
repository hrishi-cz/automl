name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E,F,W --ignore E501,E402

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_phase2_sessions.py \
            --ignore=tests/test_full_pipeline_real_e2e.py \
            --ignore=tests/test_e2e_real_datasets.py \
            -q --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  slow-tests:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - name: Run slow E2E tests
        run: |
          APEX_SEED=42 python -m pytest -m slow tests/test_e2e_real_datasets.py -xvs
        timeout-minutes: 30
